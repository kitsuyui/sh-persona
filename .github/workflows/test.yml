name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@v3.11.0
      - name: Run checks
        run: tests/check.sh
